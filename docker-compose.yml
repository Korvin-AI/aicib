services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aicib
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aicib_dev}
      POSTGRES_DB: aicib
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aicib"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - aicib

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - aicib

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://aicib:${POSTGRES_PASSWORD:-aicib_dev}@postgres:5432/aicib
      REDIS_URL: redis://redis:6379
      PORT: "3001"
      NODE_ENV: ${NODE_ENV:-development}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aicib

  web:
    build:
      context: ./ui
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    depends_on:
      - api
    networks:
      - aicib

volumes:
  pg_data:
  redis_data:

networks:
  aicib:
    driver: bridge
